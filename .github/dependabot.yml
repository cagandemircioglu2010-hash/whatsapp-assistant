version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    labels: [dependencies, security]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:15"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    labels: [dependencies, security]
