# Render Blueprint — deploy with "New > Blueprint" pointing at this repo.
# WARNING: the plans below create paid Render resources. This file does not
# modify an existing service unless you explicitly create or apply a Blueprint.
# Creates a managed Postgres and the assistant web service. It intentionally
# does not inject an owner/admin URL into the web service or run migrations
# there: production startup rejects migration credentials by design. Bootstrap
# the database from a trusted workstation, provision the two restricted roles,
# then paste only their URLs into the service (see docs/RUNBOOK.md §5).
# Secret values are left unsynced (sync: false): generate them locally with
#   npm run setup:env -- --render
# and paste the block into the Render dashboard on first deploy.
#
# The database roles referenced by DATABASE_URL / COMPANY_READONLY_DATABASE_URL
# are created once against the Render database:
#   DATABASE_ADMIN_URL=<render external connection string> npm run db:provision-app-role
#   COMPANY_DATABASE_ADMIN_URL=<same> npm run db:provision-readonly
# See docs/RUNBOOK.md §5 for the full checklist.

databases:
  - name: assistant-db
    plan: basic-256mb
    postgresMajorVersion: "17"

services:
  - type: web
    name: company-whatsapp-assistant
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: node dist/src/server.js
    healthCheckPath: /health/live
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      - key: DEFAULT_PHONE_COUNTRY
        value: TR
      - key: COMPANY_TIMEZONE
        value: Europe/Istanbul
      - key: WHATSAPP_GRAPH_API_VERSION
        value: v25.0
      - key: REQUIRE_WHATSAPP_SIGNATURE
        value: "true"
      - key: WHATSAPP_ENABLED
        value: "true"
      - key: DATABASE_SSL_MODE
        value: verify-full
      - key: COMPANY_DATABASE_SSL_MODE
        value: verify-full
      - key: COMPANY_REPORTS_ENABLED
        value: "true"
      # Everything below is a secret or account-specific: fill in the
      # dashboard (npm run setup:env -- --render prints ready-made values).
      - key: DATABASE_URL
        sync: false
      - key: COMPANY_READONLY_DATABASE_URL
        sync: false
      - key: IDENTIFIER_HASH_ACTIVE_KEY_ID
        sync: false
      - key: IDENTIFIER_HASH_KEYS
        sync: false
      - key: AUDIT_INTEGRITY_ACTIVE_KEY_ID
        sync: false
      - key: AUDIT_INTEGRITY_KEYS
        sync: false
      - key: DATA_ENCRYPTION_ACTIVE_KEY_ID
        sync: false
      - key: DATA_ENCRYPTION_KEYS
        sync: false
      - key: SAFETY_IDENTIFIER_SECRET
        sync: false
      - key: OPS_TOKEN
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: LLM_ENABLED
        sync: false
      - key: LLM_GENERAL_CHAT_ENABLED
        value: "false"
      - key: LLM_SCHEMA_DISCOVERY_ENABLED
        value: "false"
      - key: LLM_SCHEMA_ALLOWED_SCHEMAS
        value: assistant_reporting
      # The app's reviewed three-view manifest is the default. Set
      # LLM_SCHEMA_RELATION_MANIFEST explicitly for any other database schema.
      - key: LLM_PROVIDER
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        sync: false
